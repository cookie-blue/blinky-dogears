<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Pattern Generator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.blue.min.css">
    <style>
        :root {
            --pico-font-size: 92%;
            --pico-spacing: 0.75rem;
            --pico-form-element-spacing-vertical: 0.35rem;
            --pico-form-element-spacing-horizontal: 0.55rem;
        }

        header.container {
            padding-bottom: 0;
        }

        main.container {
            padding-top: 0;
        }

        h1 {
            font-size: 1.75rem;
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        section {
            margin-bottom: 1rem;
        }

        textarea#code {
            font-family: var(--pico-font-family-monospace);
            min-height: 9rem;
        }

        .lednum,
        .stepnum {
            font-variant-numeric: tabular-nums;
        }

        #ledconfig {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1rem;
        }

        #ledconfig > div {
            width: auto;
        }

        #ledconfig label,
        #steps label {
            margin-bottom: 0.15rem;
        }

        #ledconfig input {
            width: 5rem;
        }

        #ledconfig input[type=range] {
            width: 9rem;
        }

        #steps table {
            width: max-content;
            margin-bottom: 0.5rem;
        }

        #steps input[type=number] {
            width: 5rem;
        }

        #steps input[type=range] {
            width: 7rem;
            height: 1rem;
            margin: 0 0.35rem;
            vertical-align: middle;
        }

        #steps td.leds {
            width: 1%;
            white-space: nowrap;
        }

        #steps .leds>div {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            margin: 0 0.8rem 0 0;
        }

        .sliderValue {
            display: inline-block;
            font-variant-numeric: tabular-nums;
            min-width: 3ch;
            text-align: right;
        }

        #steps .step .indicator {
            visibility: hidden;
        }

        #steps .step.active .indicator {
            visibility: visible;
        }

        #steps button.delete {
            background-color: #D93526;
            border-color: #D93526;
            padding: 0.25rem 0.5rem;
        }

        #demo {
            display: flex;
            justify-content: flex-start;
            gap: 0.5rem;
        }

        #demo .demoLed {
            display: flex;
            justify-content: center;
            align-items: center;
            font-variant-numeric: tabular-nums;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: 1px solid black;
            font-size: 0.85rem;
        }

        #loadOK {
            opacity: 0;
            transition: opacity 1s ease-in-out;

            font-weight: var(--pico-font-weight);
            font-size: 1rem;
            line-height: var(--pico-line-height);
            text-align: center;
            border: var(--pico-border-width) solid #173806;
            background-color: #398712;
            color: #D7FBC1;
            display: inline-block;
            padding: var(--pico-form-element-spacing-vertical) var(--pico-form-element-spacing-horizontal);
            border-radius: var(--pico-border-radius);
        }

        #loadOK.show {
            opacity: 1;
            transition: none;
        }

        @media (max-width: 640px) {
            :root {
                --pico-font-size: 88%;
                --pico-spacing: 0.55rem;
            }

            header.container {
                padding-top: 0.75rem;
            }

            h1 {
                font-size: 1.35rem;
            }

            #ledconfig {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            #ledconfig > div:last-child {
                grid-column: 1 / -1;
            }

            #ledconfig input[type=range] {
                width: min(14rem, 72vw);
            }

            #steps table,
            #steps tbody,
            #steps tr,
            #steps td {
                display: block;
                width: 100%;
            }

            #steps table {
                min-width: 0;
                table-layout: fixed;
            }

            #steps .step {
                display: grid;
                grid-template-columns: auto 1fr auto;
                gap: 0.35rem 0.5rem;
                padding: 0.45rem 0;
                align-items: center;
            }

            #steps .step td {
                padding: 0;
            }

            #steps .step td:nth-child(1),
            #steps .step td:nth-child(2),
            #steps .step td:nth-child(6) {
                align-self: center;
                width: auto;
            }

            #steps .step td:nth-child(1) {
                grid-column: 1;
                grid-row: 1;
            }

            #steps .step td:nth-child(2) {
                grid-column: 2;
                grid-row: 1;
            }

            #steps .step td:nth-child(4) {
                display: grid;
                grid-column: 1 / 3;
                grid-row: 3;
                grid-template-columns: auto 4.75rem auto;
                align-items: center;
                gap: 0.25rem;
                width: auto;
            }

            #steps .step td:nth-child(5) {
                display: inline-flex;
                grid-column: 3;
                grid-row: 3;
                align-items: center;
                justify-self: end;
                gap: 0.25rem;
                width: auto;
            }

            #steps .step td:nth-child(5) input,
            #steps .step td:nth-child(5) label {
                margin: 0;
            }

            #steps .step td:nth-child(6) {
                grid-column: 3;
                grid-row: 1;
                justify-self: end;
            }

            #steps td.leds {
                display: grid;
                grid-column: 1 / -1;
                grid-row: 2;
                grid-template-columns: 1fr;
                gap: 0.35rem 0.5rem;
                width: 100%;
                white-space: normal;
            }

            #steps input[type=range] {
                width: 100%;
                height: 0.9rem;
                margin: 0;
                min-width: 0;
            }

            #steps .leds>div {
                display: grid;
                grid-template-columns: auto minmax(0, 1fr) auto;
                gap: 0.2rem;
                margin-right: 0;
            }

            #demo .demoLed {
                width: 3rem;
                height: 3rem;
                font-size: 0.75rem;
            }
        }
    </style>
    <script>
        let patternData = emptyPattern();
        let ledCount = 2;

        addEventListener("DOMContentLoaded", () => {
            loadLocalStorage();
            setupDemo();
            runDemo();

            document.querySelector("#ledcolor").addEventListener("change", (event) => {
                window.localStorage.setItem("ledColor", event.target.value);
            });

            document.querySelector("#load").addEventListener("click", () => {
                try {
                    loadFromCode();
                    showOK(document.querySelector("#loadOK"));
                } catch (error) {
                    alert(`Could not load pattern: ${error}`);
                    console.error(error);
                }
            });

            document.querySelector("#reset").addEventListener("click", resetPatternData);

            document.querySelector("#steps").addEventListener("input", (event) => {
                if (event.target.matches("input[type=range]")) {
                    updateSliderValue(event.target);
                    loadFromForm(false);
                }
            });

            document.querySelector("#steps").addEventListener("change", () => {
                loadFromForm();
            });

            document.querySelector("#brightness").addEventListener("input", (event) => {
                updateSliderValue(event.target);
                loadFromForm(false);
            });

            document.querySelector("#brightness").addEventListener("change", () => {
                loadFromForm();
            });

            document.querySelector("#add").addEventListener("click", () => {
                appendPatternStep();
            });

            document.querySelector("#ledcount").addEventListener("change", (event) => {
                const previousLedCount = ledCount;
                ledCount = parseInt(event.target.value);
                const stepcount = patternData["steps"].length;
                const totalBrightness = patternData["steps"].reduce((previous, current) => previous + current["leds"].reduce((a, b) => a + b, 0), 0);

                if (stepcount > 0 && totalBrightness > 0) {
                    const response = confirm("Warning! this will clear all existing steps.");
                    if (!response) {
                        ledCount = previousLedCount;
                        event.target.value = previousLedCount;
                        setupDemo();
                        return;
                    }
                }

                setupDemo();
                setPatternData(emptyPattern());
            })
        });

        function resetPatternData() {
            ledCount = 2;
            setupDemo();

            let step1 = emptyStep();
            step1["leds"][0] = 255;
            let step2 = emptyStep();
            step2["leds"][1] = 255;
            setPatternData({
                "brightness": 128,
                "steps": [step1, step2],
            });
        }

        function setPatternData(value) {
            patternData = normalizePatternData(value);
            console.log(`updated pattern data: ${JSON.stringify(patternData)}`);
            checkPatternData();

            if (patternData["steps"].length > 0) {
                ledCount = patternData["steps"][0]["leds"].length;
            }
            generateFormFromPatternData();
            generateCodeFromPatternData();
            window.localStorage.setItem("patternData", JSON.stringify(patternData));

        }

        function appendPatternStep() {
            patternData["steps"].push(emptyStep());
            setPatternData(patternData);
        }

        function removePatternStep(index) {
            setPatternData({
                ...patternData,
                "steps": patternData["steps"].filter((item, i) => i != index),
            });
        }

        function checkPatternData() {
            const totalTime = patternData["steps"].reduce((previous, current) => previous + current["duration"], 0);
            if (totalTime < 5) {
                patternData["steps"].push(emptyStep());
            }

            patternData["steps"] = patternData["steps"].map((step, index) => {
                if (step['leds'].length == 0) {
                    return emptyStep();
                }
                return step;
            });
        }

        function emptyPattern() {
            return {
                "brightness": 128,
                "steps": [],
            }
        }

        function emptyStep() {
            return {
                "leds": Array(ledCount).fill(0),
                "duration": 1000,
                "fade": false,
            }
        }

        function normalizePatternData(value) {
            if (Array.isArray(value)) {
                return {
                    "brightness": 128,
                    "steps": value.map(normalizeStep),
                };
            }

            if (typeof value !== "object" || value === null || !Array.isArray(value["steps"])) {
                return emptyPattern();
            }

            return {
                "brightness": parseNumber(value["brightness"], 128, 0, 255),
                "steps": value["steps"].map(normalizeStep),
            };
        }

        function normalizeStep(step) {
            if (Array.isArray(step)) {
                return {
                    "leds": (step[0] || []).map((value) => clamp(parseInt(value) || 0, 0, 255)),
                    "duration": clamp(parseInt(step[1]) || 0, 0, 60000),
                    "fade": Boolean(step[2]),
                };
            }

            return {
                "leds": ((step || {})["leds"] || []).map((value) => clamp(parseInt(value) || 0, 0, 255)),
                "duration": clamp(parseInt((step || {})["duration"]) || 0, 0, 60000),
                "fade": Boolean((step || {})["fade"]),
            };
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function parseNumber(value, fallback, min, max) {
            const parsed = parseInt(value);
            if (Number.isNaN(parsed)) {
                return fallback;
            }
            return clamp(parsed, min, max);
        }

        function loadLocalStorage() {
            const result = loadDataFromLocalStorage("patternData");
            if (result === undefined) {
                resetPatternData();
            } else if (typeof result !== "object" || result === null) {
                console.error("invalid format in local storage");
                resetPatternData();
            } else {
                setPatternData(result);
            }
            document.querySelector("#ledcolor").value = loadDataFromLocalStorage("ledColor") || "#F2DF0D";
        }

        function loadDataFromLocalStorage(key) {
            try {
                const localStorageData = window.localStorage.getItem(key);
                if (localStorageData) {
                    return JSON.parse(localStorageData);
                }
            } catch (error) {
                console.error(`could not load ${key} from localStorage`);
                window.localStorage.removeItem(key);
            }
        }

        function showOK(element) {
            element.classList.add("show");
            window.setTimeout(() => {
                element.classList.remove("show");
            }, 1000)
        }

        function newStep(step, index) {
            const clone = document.querySelector("#stepTemplate").content.cloneNode(true);
            for (let i = 0; i < ledCount; i++) {
                const led = newLed(step, index, i);
                clone.querySelector(".leds").append(led);
            }

            const durationInput = clone.querySelector("input#step_duration")
            durationInput.value = step["duration"] || "";
            durationInput.id = `step_duration_${index}`;
            clone.querySelector("label[for=\"step_duration\"]").setAttribute("for", `step_duration_${index}`);

            const fadeInput = clone.querySelector("input#step_fade");
            fadeInput.checked = step["fade"] || false;
            fadeInput.id = `step_fade_${index}`;
            clone.querySelector("label[for=\"step_fade\"]").setAttribute("for", `step_fade_${index}`);

            clone.querySelector(".stepnum").innerText = index + 1;

            clone.querySelector("button.delete").addEventListener("click", (event) => {
                removePatternStep(index);
            });

            document.querySelector("#steps tbody").append(clone);
        }

        function newLed(step, index, lednum) {
            const led = document.querySelector("#stepLedTemplate").content.cloneNode(true);
            const ledInput = led.querySelector("input");
            ledInput.id = `step_led_${index}_${lednum}`;
            ledInput.value = (step["leds"] || [])[lednum] || 0;

            led.querySelector("label").setAttribute("for", `step_led_${index}_${lednum}`);
            led.querySelector("label span.lednum").innerText = lednum + 1;
            led.querySelector("output").setAttribute("for", `step_led_${index}_${lednum}`);
            led.querySelector("output").innerText = ledInput.value;

            return led;
        }

        function loadFromCode() {
            const code = document.querySelector("#code").value;
            setPatternData(parsePatternCode(code));
            patternData["steps"].forEach((step, index) => {
                if (step["leds"].length != patternData["steps"][0]["leds"].length) {
                    throw new Error(`Inconsistent LED count: ${ledCount} in step 1 vs. ${step["leds"].length} in step ${index + 1}`);
                }
            });
        }

        function parsePatternCode(code) {
            const patternMatch = code.match(/\.brightness\s*=\s*(\d+)\s*,\s*\.steps\s*=\s*\{([\s\S]*)\}/);
            if (patternMatch) {
                return {
                    "brightness": parseInt(patternMatch[1]),
                    "steps": parseNamedSteps(patternMatch[2]),
                };
            }

            let oldCode = code
                // variable declaration prefix
                .replace(/^[^\{]+/, '')

                // spaces
                .replace(/\s*/g, '')

                // trailing comma/semicolon
                .replace(/[,;](\}|$)/g, '$1')

                // braces
                .replaceAll('{', '[')
                .replaceAll('}', ']');

            if (oldCode.substr(0, 3) !== '[[[') {
                oldCode = `[${oldCode}]`;
            }

            return JSON.parse(oldCode);
        }

        function parseNamedSteps(stepsCode) {
            const steps = [];
            const stepRegex = /\{\s*\.leds\s*=\s*\{([^}]*)\}\s*,\s*\.duration\s*=\s*(\d+)\s*,\s*\.fade\s*=\s*(true|false|0|1)\s*\}/g;
            let match;

            while ((match = stepRegex.exec(stepsCode)) !== null) {
                steps.push({
                    "leds": match[1].split(",").map((value) => clamp(parseInt(value) || 0, 0, 255)),
                    "duration": clamp(parseInt(match[2]) || 0, 0, 60000),
                    "fade": match[3] === "true" || match[3] === "1",
                });
            }

            if (steps.length == 0) {
                throw new Error("No steps found");
            }

            return steps;
        }

        function generateFormFromPatternData() {
            document.querySelector("#steps tbody").innerHTML = "";

            patternData["steps"].forEach((step, index) => {
                newStep(step, index);
            });

            document.querySelector("#brightness").value = patternData["brightness"];
            updateSliderValue(document.querySelector("#brightness"));

            if (patternData["steps"].length > 0 && patternData["steps"][0]["leds"].length > 0) {
                document.querySelector("#ledcount").value = parseInt(patternData["steps"][0]["leds"].length);
            }
        }

        function loadFromForm(renderForm = true) {
            let steps = [];
            document.querySelectorAll("#steps .step").forEach((element) => {
                const leds = generateLeds(element.querySelectorAll("input.step_led"));
                const duration = parseInt(element.querySelector("input.step_duration").value) || 0;
                const fade = element.querySelector("input.step_fade").checked;
                const step = {
                    "leds": leds,
                    "duration": duration,
                    "fade": fade,
                };
                steps.push(step);
            });
            const newPatternData = {
                "brightness": parseInt(document.querySelector("#brightness").value) || 0,
                "steps": steps,
            };

            if (renderForm) {
                setPatternData(newPatternData);
            } else {
                patternData = normalizePatternData(newPatternData);
                checkPatternData();
                generateCodeFromPatternData();
                window.localStorage.setItem("patternData", JSON.stringify(patternData));
            }
        }

        function generateCodeFromPatternData() {
            if (patternData["steps"].length > 0) {
                const steps = patternData["steps"]
                    .map((step) => `    {.leds = {${step["leds"].join(", ")}}, .duration = ${step["duration"]}, .fade = ${step["fade"] ? "true" : "false"}}`)
                    .join(",\n");

                document.querySelector("#code").value = [
                    "{ .brightness = " + patternData["brightness"] + ", .steps = {",
                    steps,
                    "}}",
                ].join("\n");
            } else {
                document.querySelector("#code").value = "";
            }
        }

        function generateLeds(leds) {
            let result = [];
            leds.forEach((element) => {
                const led = parseInt(element.value);
                result.push(led);
            });
            return result;
        }

        function updateSliderValue(input) {
            const output = input.parentElement.querySelector("output");
            if (output) {
                output.value = input.value;
                output.innerText = input.value;
            }
        }

        function setupDemo() {
            document.querySelector("#demo").innerHTML = "";

            for (let i = 0; i < ledCount; i++) {
                const ledTemplate = document.querySelector("#demoLedTemplate").content.cloneNode(true);
                const led = ledTemplate.querySelector(".demoLed");
                led.id = `demo_led_${i}`;
                led.innerText = `LED ${i + 1}`;
                document.querySelector("#demo").append(led);
            }
        }

        async function runDemo() {
            while (true) {
                let currentPatternData = JSON.parse(JSON.stringify(patternData));
                for (const index in currentPatternData["steps"]) {
                    const step = currentPatternData["steps"][index];
                    highlightCurrentStep(index);
                    const demoStep = await runDemoStep(step);
                }
            }
        }

        function highlightCurrentStep(currentIndex) {
            document.querySelectorAll("#steps .step").forEach((element, key) => {
                if (key == currentIndex) {
                    element.classList.add("active");
                } else {
                    element.classList.remove("active");
                }
            });
        }

        function runDemoStep(step) {
            return new Promise((resolve) => {
                const ledColor = document.querySelector("#ledcolor").value;
                const isFade = Boolean(step["fade"]);
                const duration = parseInt(step["duration"]);
                const leds = step["leds"];
                const patternBrightness = patternData["brightness"] / 255;
                leds.forEach((value, index) => {
                    const leds = document.querySelectorAll("#demo .demoLed");
                    if (leds.length < index + 1) {
                        return;
                    }
                    if (isFade) {
                        leds[index].style.transition = `background-color ${duration}ms`;
                    } else {
                        leds[index].style.transition = `none`;
                    }
                    const alpha = Math.round(value * patternBrightness);
                    const newColor = `${ledColor}${alpha.toString(16).padStart(2, "0")}`;
                    leds[index].style.backgroundColor = newColor;
                });
                setTimeout(() => {
                    resolve();
                }, duration);
            });
        }
    </script>
</head>

<body>
    <header class="container">
        <hgroup>
            <h1>Pattern Generator</h1>
        </hgroup>
    </header>
    <main class="container">
        <section id="ledconfig">
            <div>
                <label for="ledcolor">LED Color:</label>
                <input type="color" id="ledcolor" value="#FFFF00">
            </div>
            <div>
                <label for="ledcount">LED Count:</label>
                <input id="ledcount" type="number" value="2" min="1">
            </div>
            <div>
                <label for="brightness">Brightness:</label>
                <input id="brightness" type="range" min="0" max="255">
                <output for="brightness" class="sliderValue"></output>
            </div>
        </section>
        <section>
            <h2>Animation Steps:</h2>
            <template id="stepLedTemplate">
                <div>
                    <label for="step_led">LED <span class="lednum">?</span>:</label> <input type="range" id="step_led"
                        class="step_led" min="0" max="255"> <output for="step_led" class="sliderValue"></output>
                </div>
            </template>
            <template id="stepTemplate">
                <tr class="step">
                    <td><span class="indicator">&rsaquo;</span></td>
                    <td>
                        #<span class="stepnum">?</span>
                    </td>
                    <td class="leds">
                    </td>
                    <td>
                        <label for="step_duration">duration:</label> <input type="number" id="step_duration"
                            class="step_duration" min="0" max="60000"> ms
                    </td>
                    <td>
                        <input type="checkbox" role="switch" id="step_fade" class="step_fade" value="1"><label
                            for="step_fade">fade</label>
                    </td>
                    <td>
                        <button class="delete">&times;</button>
                    </td>
                </tr>
            </template>
            <form id="steps">
                <table class="striped">
                    <tbody>
                    </tbody>
                </table>
            </form>
            <button id="add">+</button><br>
        </section>
        <section>
            <h2>Demo</h2>
            <template id="demoLedTemplate">
                <div class="demoLed"></div>
            </template>
            <div id="demo"></div>
        </section>
        <section>
            <label for="code">
                <h2>Code</h2>
            </label>
            <textarea id="code" cols="50" rows="10" placeholder="{ .brightness = 128, .steps = {
    {.leds = {255, 0}, .duration = 300, .fade = false},
    {.leds = {0, 255}, .duration = 300, .fade = false},
}}"></textarea>
            <br>
            <button id="load">Load</button> <button id="reset" class="secondary">Reset</button>
            <div id="loadOK">OK</div>
        </section>
    </main>
</body>

</html>
